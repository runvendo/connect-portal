# CI template for the standalone runvendo/connect-portal repo.
#
# SETUP: Move this file to .github/workflows/ci.yml in the new repo
# (see docs/runbooks/connect-portal-publish.md step 3).
#
# To enable NPM publish on tag push, add an NPM_TOKEN secret to the repo
# (Settings > Secrets > Actions) and uncomment the publish job below.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Test, build, size-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Bundle size gate (30 KB gzip cap)
        run: npm run size:check

      - name: Build Storybook (smoke)
        run: npm run build-storybook
